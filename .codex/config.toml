project_doc_fallback_filenames = ["CLAUDE.md"]

# Migrated from mcp-configs/mcp-servers.json.
# Replace placeholder env values before enabling the corresponding servers.

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "YOUR_GITHUB_PAT_HERE"

[mcp_servers.firecrawl]
command = "npx"
args = ["-y", "firecrawl-mcp"]

[mcp_servers.firecrawl.env]
FIRECRAWL_API_KEY = "YOUR_FIRECRAWL_KEY_HERE"

[mcp_servers.supabase]
command = "npx"
args = ["-y", "@supabase/mcp-server-supabase@latest", "--project-ref=YOUR_PROJECT_REF"]

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[mcp_servers.vercel]
url = "https://mcp.vercel.com"

[mcp_servers.railway]
command = "npx"
args = ["-y", "@railway/mcp-server"]

[mcp_servers.cloudflare-docs]
url = "https://docs.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-workers-builds]
url = "https://builds.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-workers-bindings]
url = "https://bindings.mcp.cloudflare.com/mcp"

[mcp_servers.cloudflare-observability]
url = "https://observability.mcp.cloudflare.com/mcp"

[mcp_servers.clickhouse]
url = "https://mcp.clickhouse.cloud/mcp"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@context7/mcp-server"]

[mcp_servers.magic]
command = "npx"
args = ["-y", "@magicuidesign/mcp@latest"]

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/your/projects"]
